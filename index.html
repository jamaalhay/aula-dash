<!doctype html><html lang=en><meta charset=utf-8><meta name=viewport content='width=device-width,initial-scale=1'><title>Aula — pipeline</title><style>*{box-sizing:border-box}body{font:15px/1.55 -apple-system,system-ui,Segoe UI,Roboto,sans-serif;margin:0;background:#f4f6f9;color:#1d2433}
.wrap{max-width:860px;margin:0 auto;padding:18px}header h1{margin:0;color:#1F3A5F;font-size:1.5rem}.upd{color:#8a94a6;font-size:.8rem;margin:4px 0 16px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:8px}
.card{background:#fff;border:1px solid #e4e9f0;border-radius:11px;padding:12px}.card .n{font-size:1.5rem;font-weight:700;color:#1F3A5F}.card .l{font-size:.78rem;color:#6b7587}
h2{color:#1F3A5F;font-size:1.05rem;margin:26px 0 8px}table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e4e9f0;border-radius:11px;overflow:hidden}
td{border-top:1px solid #eef1f5;padding:9px 11px;vertical-align:top;text-align:left}tr:first-child td{border-top:0}small{color:#8a94a6}
.pill{display:inline-block;background:#eef2f8;color:#3a4a63;border-radius:6px;padding:2px 8px;font-size:.74rem;font-weight:600;white-space:nowrap}
.pill.hi{background:#fde2e2;color:#b22}.draft{margin-top:6px;background:#f7f9fb;border:1px solid #e4e9f0;border-radius:7px;padding:8px;white-space:pre-wrap;font-size:.88rem}
.recent{margin:6px 0;padding-left:18px}.recent li{margin:2px 0}.hint{color:#8a94a6;font-size:.85rem;margin:2px 0 8px}
.ok{color:#1a7f37}.warn{color:#b22;font-weight:600}a{color:#2f6f7d}footer{margin:34px 0 10px;color:#aab2c0;font-size:.78rem;text-align:center}
.clip{max-height:4.6em;overflow:hidden}.clip.open{max-height:1000px}.tgl{display:inline-block;margin-top:3px;color:#2f6f7d;cursor:pointer;font-size:.8rem;font-weight:600;user-select:none}
.rev{margin-top:7px;background:#fff6e5;border:1px solid #f0d9a0;border-radius:7px;padding:6px 9px;font-size:.85rem;color:#7a5b00}
.copy{background:#f7f9fb;border:1px solid #e4e9f0;border-radius:7px;padding:9px 11px;white-space:pre-wrap;margin:4px 0;font-size:.9rem}
.qa{margin:8px 0}.qa .q{font-weight:600;color:#1F3A5F;font-size:.9rem}h4{color:#1F3A5F;margin:14px 0 4px}
.convo .chdr{margin-bottom:7px}.convo .chdr small{color:#8a94a6}
.msg{margin:5px 0;padding:7px 11px;border-radius:12px;font-size:.9rem;max-width:86%;width:fit-content;white-space:pre-wrap;line-height:1.4}
.msg .who{display:block;font-size:.7rem;font-weight:700;letter-spacing:.02em;color:#8a94a6;margin-bottom:2px}
.msg.them{background:#eef2f8;color:#22303f;border-bottom-left-radius:3px}
.msg.me{background:#e4f1ea;color:#183a29;margin-left:auto;border-bottom-right-radius:3px}.msg.me .who{color:#4c8a68;text-align:right}
.dl{display:inline-block;background:#1F3A5F;color:#fff;text-decoration:none;padding:8px 13px;border-radius:8px;font-weight:600;margin:8px 0}
section{border-top:1px solid #e4e9f0;padding-top:6px;margin-top:18px}.back{display:inline-block;margin:10px 0;color:#2f6f7d}
